# coursework listed under the `coursework` tab.
# semesters render top-to-bottom in the order below.
# each course has a `code`, `title`, and optional `cheatsheets` list.
# cheatsheet urls can be local (e.g. /docs/foo.pdf) or external.
# trailing "*" on a title flags accredited courses taken outside of berkeley
# (the asterisk gets a footnote rendered at the bottom of the section).

- name: spring 2026
